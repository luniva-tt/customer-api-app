version: '3.9'

services:
  db:
    image: postgres:16
    container_name: postgres_container

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql